name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: vet (host)
        run: go vet ./...
      - name: test
        run: go test ./...
      - name: build (wasm)
        run: GOOS=js GOARCH=wasm go build ./...
      - name: vet (wasm)
        run: GOOS=js GOARCH=wasm go vet ./...

      - name: examples (wasm)
        working-directory: examples
        run: |
          GOOS=js GOARCH=wasm go build ./...
          GOOS=js GOARCH=wasm go vet ./...

      - name: ui templates in sync
        working-directory: cmd/grove
        run: |
          go generate ./...
          git diff --exit-code -- templates/
